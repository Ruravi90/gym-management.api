[phases.setup]
nixPkgs = ["...", "libglvnd", "glib", "python3", "gcc"]
aptPkgs = ["libgl1", "libglib2.0-0"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "pip install poetry",
  "poetry config virtualenvs.create false",
  "poetry install --only=main"
]

[phases.build]
dependsOn = ["install"]
cmds = []
