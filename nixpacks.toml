[phases.setup]
nixPkgs = ["...", "python3", "python3Packages.pip", "python3Packages.setuptools", "poetry", "gcc", "libglvnd", "glib"]
aptPkgs = ["libgl1", "libglib2.0-0"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "poetry config virtualenvs.create false",
  "poetry install --only=main"
]

[phases.build]
dependsOn = ["install"]
cmds = []
